<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport"
  content="width=device-width, initial-scale=1.0,

<meta name="apple-mobile-web-app-capable"
  content="yes">
<meta name="theme-color" content="#1a1612">
<title>Bobby Fischer Teaches Chess</title>
<link rel="icon" href="../logo.png">
<link rel="apple-touch-icon" href="../logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"

<style>
:root {
  --bg: #141820;
  --raised: #1a2030;
  --card: #1e2638;
  --border: #2a3550;
  --gold: #c5a55a;
  --text: #c8cad0;
  --dim: #6a7088;
  --bright: #e8eaf0;
  --ok: #5a8a5a;
  --err: #c45050;
  --lsq: #d4b896;
  --dsq: #8a6e4a;
  --r: 8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  line-height:1.7;
}

/* HEADER */
.hdr{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;
  justify-content:space-between;
  padding:12px 20px;background:var(--raised);
  border-bottom:1px solid var(--border);
}
.hdr h1{
  font-family:'Playfair Display',serif;
  font-size:20px;color:var(--bright);
}
.hdr h1 span{color:var(--gold)}
.hdr-r{font-size:12px;color:var(--dim)}

/* CHAPTER TABS */
.tabs{
  display:flex;overflow-x:auto;
  border-bottom:1px solid var(--border);
  background:var(--raised);
}
.tab{
  padding:10px 16px;border:none;background:none;
  color:var(--dim);font:inherit;font-size:13px;
  cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;
}
.tab:hover{color:var(--text)}
.tab.on{color:var(--gold);
  border-bottom-color:var(--gold)}
.tab.locked{opacity:.4;cursor:default}

/* CONTENT */
.wrap{max-width:720px;margin:0 auto;
  padding:24px 16px 100px}

/* SECTION */
.sec{margin-bottom:40px}
.sec h2{
  font-family:'Playfair Display',serif;
  font-size:24px;color:var(--bright);
  margin-bottom:6px;
}
.sec h3{
  font-size:16px;color:var(--gold);
  margin:20px 0 8px;
  font-family:'Playfair Display',serif;
}
.sec p{font-size:14px;margin-bottom:12px}
.sec strong{color:var(--bright)}

/* BOARD */
.bwrap{
  display:flex;justify-content:center;
  margin:16px 0;
}
.bout{
  border:2px solid var(--gold);border-radius:3px;
  overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.bout svg{display:block;cursor:pointer}

/* SIDE-BY-SIDE BOARDS */
.duo{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;margin:16px 0;
}
.duo-cell{text-align:center}
.duo-cell .lbl{
  font-weight:600;font-size:13px;
  color:var(--bright);margin-top:6px;
}
.duo-cell .desc{
  font-size:12px;color:var(--dim);
  margin-top:3px;line-height:1.5;
}

/* PUZZLE CARD */
.puz{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  margin-bottom:24px;overflow:hidden;
}
.puz-head{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:10px 14px;background:var(--raised);
  border-bottom:1px solid var(--border);
}
.puz-n{
  font-family:'Playfair Display',serif;
  font-size:15px;color:var(--gold);font-weight:700;
}
.badge{
  font-size:11px;padding:3px 10px;
  border-radius:12px;text-transform:uppercase;
  letter-spacing:.5px;font-weight:600;
}
.badge.puzzle{background:rgba(197,165,90,.15);
  color:var(--gold)}
.badge.done{background:rgba(90,138,90,.15);
  color:#8fc88f}
.puz-body{padding:14px}
.puz-text{font-size:14px;margin-bottom:12px}
.puz-q{font-size:14px;font-weight:500;
  color:var(--bright);margin-bottom:10px}

/* MOVE PROMPT */
.move-prompt{
  background:rgba(197,165,90,.08);
  border:1px solid rgba(197,165,90,.25);
  border-radius:var(--r);padding:12px 14px;
  font-size:13px;color:var(--gold);
  margin-bottom:12px;text-align:center;
}

/* CHOICES */
.opts{display:flex;flex-direction:column;gap:6px;
  margin-bottom:10px}
.opt{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  border:1px solid var(--border);
  border-radius:var(--r);background:var(--raised);
  color:var(--text);font:inherit;font-size:14px;
  cursor:pointer;text-align:left;
}
.opt:hover{border-color:var(--gold);
  color:var(--bright)}
.dot{
  width:16px;height:16px;border:2px solid var(--dim);
  border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;
  justify-content:center;font-size:11px;
}
.opt.right{border-color:var(--ok);
  background:rgba(90,138,90,.08)}
.opt.right .dot{border-color:var(--ok);
  background:var(--ok);color:#fff}
.opt.wrong{border-color:var(--err);
  background:rgba(196,80,80,.08);opacity:.6}
.opt.wrong .dot{border-color:var(--err);
  color:var(--err)}
.opt.off{pointer-events:none;opacity:.45}

/* ANSWER BOX */
.ans{
  padding:12px 14px;border-radius:var(--r);
  font-size:14px;line-height:1.6;display:none;
  margin-top:10px;
}
.ans.show{display:block}
.ans.ok{background:rgba(90,138,90,.1);
  border:1px solid rgba(90,138,90,.3);color:#b0d8b0}
.ans.bad{background:rgba(196,80,80,.1);
  border:1px solid rgba(196,80,80,.3);color:#e8a0a0}
.ans strong{color:var(--bright)}

/* REVEAL BTN */
.rev{
  padding:7px 14px;border:1px dashed var(--dim);
  border-radius:var(--r);background:none;
  color:var(--dim);font:inherit;font-size:12px;
  cursor:pointer;margin-top:6px;
}
.rev:hover{border-color:var(--gold);
  color:var(--gold)}

/* FREE PLAY */
.free-bar{
  display:flex;gap:8px;justify-content:center;
  margin:12px 0;flex-wrap:wrap;
}
.fbtn{
  padding:8px 16px;border:1px solid var(--border);
  border-radius:var(--r);background:var(--card);
  color:var(--text);font:inherit;font-size:13px;
  cursor:pointer;
}
.fbtn:hover{border-color:var(--gold);
  color:var(--bright)}

/* MOBILE */
.bout svg{max-width:100%;height:auto}
@media(max-width:600px){
  .wrap{padding:12px 8px 80px}
  .duo{grid-template-columns:1fr}
  .hdr h1{font-size:16px}
  .tabs{gap:0}
  .tab{padding:8px 10px;font-size:11px}
  .sec h2{font-size:20px}
  .sec h3{font-size:14px}
  .puz-text,.sec p{font-size:13px}
  .free-bar{gap:6px}
  .fbtn{font-size:11px;padding:6px 10px}
}
</style>

<script>
// ==========================================
// CHESS ENGINE
// ==========================================
const SQ = 50;
const P = {
  K:{c:'w',s:'\u2654'},Q:{c:'w',s:'\u2655'},
  R:{c:'w',s:'\u2656'},B:{c:'w',s:'\u2657'},
  N:{c:'w',s:'\u2658'},P:{c:'w',s:'\u2659'},
  k:{c:'b',s:'\u265A'},q:{c:'b',s:'\u265B'},
  r:{c:'b',s:'\u265C'},b:{c:'b',s:'\u265D'},
  n:{c:'b',s:'\u265E'},p:{c:'b',s:'\u265F'},
};
function fen2b(fen){
  const b=new Array(64).fill(null);
  let ri=0,ci=0;
  for(const ch of fen){
    if(ch==='/'){ri++;ci=0}
    else if(ch>='1'&&ch<='8')ci+=+ch;
    else if(ch==' ')break;
    else if(P[ch]){b[ri*8+ci]=ch;ci++}
  }
  return b;
}
function pc(p){return p?
  (p===p.toUpperCase()?'w':'b'):null}
function inB(r,c){return r>=0&&r<8&&c>=0&&c<8}

function getMoves(board,i){
  const p=board[i];if(!p)return[];
  const info=P[p],color=info.c;
  const r=Math.floor(i/8),c=i%8,mv=[];
  function add(tr,tc){
    if(!inB(tr,tc))return false;
    const t=board[tr*8+tc];
    if(t&&pc(t)===color)return false;
    mv.push(tr*8+tc);return !t;
  }
  function slide(dr,dc){
    let tr=r+dr,tc=c+dc;
    while(inB(tr,tc)){if(!add(tr,tc))break;
      tr+=dr;tc+=dc}
  }
  const type=info.s==='\u2654'||info.s==='\u265A'
    ?'k':info.s==='\u2655'||info.s==='\u265B'
    ?'q':info.s==='\u2656'||info.s==='\u265C'
    ?'r':info.s==='\u2657'||info.s==='\u265D'
    ?'b':info.s==='\u2658'||info.s==='\u265E'
    ?'n':'p';
  switch(type){
    case 'k':
      for(let dr=-1;dr<=1;dr++)
        for(let dc=-1;dc<=1;dc++)
          if(dr||dc)add(r+dr,c+dc);break;
    case 'q':
      for(let dr=-1;dr<=1;dr++)
        for(let dc=-1;dc<=1;dc++)
          if(dr||dc)slide(dr,dc);break;
    case 'r':
      slide(0,1);slide(0,-1);
      slide(1,0);slide(-1,0);break;
    case 'b':
      slide(1,1);slide(1,-1);
      slide(-1,1);slide(-1,-1);break;
    case 'n':
      [[-2,-1],[-2,1],[-1,-2],[-1,2],
       [1,-2],[1,2],[2,-1],[2,1]]
        .forEach(([dr,dc])=>add(r+dr,c+dc));break;
    case 'p':
      const dir=color==='w'?-1:1;
      const sr=color==='w'?6:1;
      const f1=r+dir;
      if(inB(f1,c)&&!board[f1*8+c]){
        mv.push(f1*8+c);
        const f2=r+dir*2;
        if(r===sr&&!board[f2*8+c])mv.push(f2*8+c);
      }
      for(const dc of[-1,1]){
        const tc=c+dc;
        if(inB(f1,tc)){
          const t=board[f1*8+tc];
          if(t&&pc(t)!==color)mv.push(f1*8+tc);
        }
      }break;
  }
  return mv;
}

// ==========================================
// BOARD RENDERING
// ==========================================
function mkBoard(container,fen,sz){
  sz=sz||SQ;
  const bsz=sz*8;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',bsz);
  svg.setAttribute('height',bsz);
  svg.setAttribute('viewBox',`0 0 ${bsz} ${bsz}`);
  const board=fen2b(fen);
  for(let r=0;r<8;r++)
    for(let c=0;c<8;c++){
      const rect=document.createElementNS(ns,'rect');
      rect.setAttribute('x',c*sz);
      rect.setAttribute('y',r*sz);
      rect.setAttribute('width',sz);
      rect.setAttribute('height',sz);
      rect.setAttribute('fill',
        (r+c)%2===0?'#d4b896':'#8a6e4a');
      svg.appendChild(rect);
    }
  const hlG=document.createElementNS(ns,'g');
  hlG.classList.add('hl');svg.appendChild(hlG);
  const pcG=document.createElementNS(ns,'g');
  pcG.classList.add('pcs');svg.appendChild(pcG);
  const dotG=document.createElementNS(ns,'g');
  dotG.classList.add('dots');svg.appendChild(dotG);
  drawPieces(svg,board,sz);
  container.appendChild(svg);
  return{svg,board,sz};
}

function drawPieces(svg,board,sz){
  const ns='http://www.w3.org/2000/svg';
  const g=svg.querySelector('.pcs');
  while(g.firstChild)g.removeChild(g.firstChild);
  for(let i=0;i<64;i++){
    if(!board[i])continue;
    const info=P[board[i]];
    const t=document.createElementNS(ns,'text');
    const r=Math.floor(i/8),c=i%8;
    t.setAttribute('x',c*sz+sz/2);
    t.setAttribute('y',r*sz+sz/2+2);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','central');
    t.setAttribute('font-size',sz*.76);
    t.style.userSelect='none';
    t.style.pointerEvents='none';
    if(info.c==='w'){
      t.setAttribute('fill','#fff');
      t.setAttribute('stroke','#2a2016');
      t.setAttribute('stroke-width','1.2');
      t.setAttribute('paint-order','stroke');
    }else{
      t.setAttribute('fill','#1a1208');
      t.setAttribute('stroke','#000');
      t.setAttribute('stroke-width','0.5');
    }
    t.textContent=info.s;g.appendChild(t);
  }
}

function clearHL(svg){
  const hl=svg.querySelector('.hl');
  while(hl.firstChild)hl.removeChild(hl.firstChild);
  const dots=svg.querySelector('.dots');
  while(dots.firstChild)
    dots.removeChild(dots.firstChild);
}

function hlSq(svg,idx,color,sz){
  const ns='http://www.w3.org/2000/svg';
  const g=svg.querySelector('.hl');
  const r=Math.floor(idx/8),c=idx%8;
  const rect=document.createElementNS(ns,'rect');
  rect.setAttribute('x',c*sz);
  rect.setAttribute('y',r*sz);
  rect.setAttribute('width',sz);
  rect.setAttribute('height',sz);
  rect.setAttribute('fill',color);
  rect.style.pointerEvents='none';
  g.appendChild(rect);
}

function showDots(svg,board,moves,sz){
  const ns='http://www.w3.org/2000/svg';
  const g=svg.querySelector('.dots');
  while(g.firstChild)g.removeChild(g.firstChild);
  for(const m of moves){
    const r=Math.floor(m/8),c=m%8;
    const cx=c*sz+sz/2,cy=r*sz+sz/2;
    if(board[m]){
      const ring=document.createElementNS(ns,
        'circle');
      ring.setAttribute('cx',cx);
      ring.setAttribute('cy',cy);
      ring.setAttribute('r',sz/2-3);
      ring.setAttribute('fill','none');
      ring.setAttribute('stroke',
        'rgba(196,80,80,.7)');
      ring.setAttribute('stroke-width','3');
      ring.style.pointerEvents='none';
      g.appendChild(ring);
    }else{
      const dot=document.createElementNS(ns,
        'circle');
      dot.setAttribute('cx',cx);
      dot.setAttribute('cy',cy);
      dot.setAttribute('r',7);
      dot.setAttribute('fill',
        'rgba(90,138,90,.5)');
      dot.style.pointerEvents='none';
      g.appendChild(dot);
    }
  }
}

function sqFromEv(svg,e,sz){
  const rect=svg.getBoundingClientRect();
  const bsz=sz*8;
  const x=(e.clientX-rect.left)*bsz/rect.width;
  const y=(e.clientY-rect.top)*bsz/rect.height;
  const c=Math.floor(x/sz),r=Math.floor(y/sz);
  if(!inB(r,c))return -1;
  return r*8+c;
}

// ==========================================
// STATE
// ==========================================
let solved=new Set();
const SK='fischer-ch1';
try{solved=new Set(JSON.parse(
  localStorage.getItem(SK)||'[]'))}catch(e){}
function save(){localStorage.setItem(SK,
  JSON.stringify([...solved]))}

// ==========================================
// HELPERS
// ==========================================
function addHTML(container,html){
  const div=document.createElement('div');
  div.innerHTML=html;
  while(div.firstChild)
    container.appendChild(div.firstChild);
}

// ==========================================
// BUILD PAGE
// ==========================================
function build(){
  const w=document.getElementById('content');
  w.innerHTML='';

  // === SECTION 1: WHAT IS CHECKMATE ===
  addHTML(w,`
<div class="sec">
  <h2>What Is Checkmate?</h2>
  <p>The object of chess is to attack the enemy
  King so it <strong>cannot escape capture</strong>.
  When that happens, the King is
  <strong>checkmated</strong> and the game is over.</p>
  <p>Whenever a King is under attack — called
  <strong>check</strong> — it must escape
  immediately. There are exactly three ways:</p>
  <p><strong>1. Capture</strong> the attacking
  piece.<br>
  <strong>2. Block</strong> (interpose) — place a
  piece between the attacker and your King.<br>
  <strong>3. Flee</strong> — move your King to
  a safe square.</p>
  <p>If none of these three options work, it's
  <strong>checkmate</strong>. Game over.</p>
  <p>But there's a trap: if a player has
  <strong>no legal moves</strong> but is
  <strong>NOT in check</strong>, it's called
  <strong>stalemate</strong> — and the game is
  a <strong>draw</strong>. Not a win. Avoiding
  accidental stalemate is just as important as
  delivering checkmate.</p>
</div>`);

  // === PROTECTED VS UNPROTECTED ===
  addHTML(w,`
<div class="sec">
  <h2>Protected vs. Unprotected</h2>
  <p>The single most important question when you
  see a check: <strong>is the checking piece
  protected?</strong></p>
  <p>If the checking piece is
  <strong>unprotected</strong>, the King can simply
  capture it. Crisis over. But if another piece
  is <strong>guarding</strong> the checker, the
  King can't take it — and you need to find
  another way out.</p>
</div>`);

  // Side-by-side: protected vs not
  const duo1=document.createElement('div');
  duo1.className='duo';
  duo1.innerHTML=`
    <div class="duo-cell">
      <div class="bwrap"><div class="bout"
        id="d1a"></div></div>
      <div class="lbl">Check — King Escapes</div>
      <div class="desc">Rook checks but is
        unprotected. King captures it.</div>
    </div>
    <div class="duo-cell">
      <div class="bwrap"><div class="bout"
        id="d1b"></div></div>
      <div class="lbl">Checkmate!</div>
      <div class="desc">Rook is protected by the
        other Rook. King can't capture — mate.</div>
    </div>`;
  w.appendChild(duo1);
  const b1a=mkBoard(document.getElementById('d1a'),
    '5Rk1/6pp/8/8/8/8/8/6K1',36);
  setupExploreBoard(b1a);
  const b1b=mkBoard(document.getElementById('d1b'),
    'R4Rk1/6pp/8/8/8/8/8/6K1',36);
  setupExploreBoard(b1b);

  // PUZZLE: Can king capture?
  addPuzzle(w,{
    id:'f6',num:6,
    text:'The White Queen is giving check. Can the Black King capture it?',
    fen:'6k1/7Q/8/8/4B3/8/8/4K3',
    type:'choice',
    q:'The Black King:',
    opts:['can capture the Queen',
      'cannot capture — checkmate'],
    ans:1,
    expl:'The Queen is protected by the Bishop along the diagonal (e4\u2013f5\u2013g6\u2013h7). The King cannot capture, cannot flee, cannot block. <strong>Checkmate.</strong>',
  });

  addPuzzle(w,{
    id:'f7',num:7,
    text:'Same setup, but the Bishop is on a different square. Does that change things?',
    fen:'k7/Q7/8/8/8/5B2/8/4K3',
    type:'choice',
    q:'The Black King:',
    opts:['can capture the Queen',
      'cannot capture — checkmate'],
    ans:0,
    expl:'<strong>Can capture!</strong> The Bishop on f3 is NOT protecting the Queen on a7 — wrong diagonal. The King takes the Queen and lives.',
  });

  addPuzzle(w,{
    id:'f8',num:8,
    text:'A Rook and Knight combination. The Knight is far from the action.',
    fen:'6Rk/7p/8/8/4N3/8/8/6K1',
    type:'choice',
    q:'Black King:',
    opts:['can capture the checking Rook',
      'cannot capture — checkmate'],
    ans:0,
    expl:'<strong>Can capture.</strong> The Knight on e4 is too far away to protect g8. King takes the Rook.',
  });

  addPuzzle(w,{
    id:'f9',num:9,
    text:'Same pieces — but the Knight moved closer.',
    fen:'6Rk/4N2p/8/8/8/8/8/6K1',
    type:'choice',
    q:'Black King:',
    opts:['can capture the checking Rook',
      'cannot capture — checkmate'],
    ans:1,
    expl:'<strong>Cannot capture.</strong> The Knight on e7 protects g8 via its L-shaped move. The King is trapped by its own pawn on h7. <strong>Checkmate.</strong>',
  });

  addPuzzle(w,{
    id:'f10',num:10,
    text:'The White Rook checks from the corner. It\'s right next to the Black King.',
    fen:'R7/k1p5/1p6/8/8/8/1K6/8',
    type:'choice',
    q:'Black King:',
    opts:['can capture the checking Rook',
      'cannot capture — checkmate'],
    ans:0,
    expl:'<strong>Can capture.</strong> The Rook on a8 is unprotected and adjacent to the King on a7. King simply takes it.',
  });

  // === FLIGHT SQUARES ===
  addHTML(w,`
<div class="sec">
  <h3>Flight Squares &amp; Smothered Mate</h3>
  <p>Sometimes the King can escape check by
  <strong>fleeing</strong> to a safe square —
  called a "flight square." But if the King's
  own pieces block every escape route, it can be
  <strong>smothered</strong>.</p>
</div>`);

  const duo2=document.createElement('div');
  duo2.className='duo';
  duo2.innerHTML=`
    <div class="duo-cell">
      <div class="bwrap"><div class="bout"
        id="d2a"></div></div>

  addHTML(w,`
<div class="sec">
  <h2>Pins — The Silent Killer</h2>
  <p>A <strong>pin</strong> occurs when a piece
  cannot move because doing so would expose its
  own King to capture. A pinned piece
  <strong>loses most of its powers</strong> —
  it can't capture, interpose, or defend.</p>
  <p>Fischer calls pins "the seeds of many
  combinations." They're one of the most
  important tactical ideas in chess because
  they can paralyze an opponent's defenses.</p>
  <p>There are three types of pins:</p>
  <p><strong>Absolute pin:</strong> The pinned
  piece shields the King. It literally
  <strong>cannot</strong> move — it's illegal.
  This is the most powerful type.</p>
  <p><strong>Relative pin:</strong> The pinned
  piece shields a valuable piece (like the
  Queen). It <strong>can</strong> move, but
  doing so would lose material.</p>
  <p>In Fischer's examples, you'll see
  positions where the defense LOOKS available
  — a Queen appears to guard a square, a
  Knight seems ready to interpose — but the
  piece is <strong>pinned</strong> and
  powerless. Learning to spot pins is one of
  the fastest ways to improve.</p>
  <p>A remarkable fact: <strong>a pinned piece
  can still pin another piece!</strong>
  Fischer shows a position where White's
  Bishop is itself pinned, yet it pins one
  of Black's Rooks. Pins within pins — the
  complexity builds fast.</p>
</div>`);

function addPuzzle(container,p){
  const card=document.createElement('div');
  card.className='puz';card.id='puz-'+p.id;
  const done=solved.has(p.id);
  card.innerHTML=`
    <div class="puz-head">
      <span class="puz-n">Frame ${p.num}</span>
      <span class="badge ${done?'done':'puzzle'}">
        ${done?'Solved \u2713':'Puzzle'}</span>
    </div>`;
  const body=document.createElement('div');
  body.className='puz-body';

  const txt=document.createElement('div');
  txt.className='puz-text';
  txt.innerHTML=p.text;body.appendChild(txt);

  const bw=document.createElement('div');
  bw.className='bwrap';
  const bo=document.createElement('div');
  bo.className='bout';
  const brd=mkBoard(bo,p.fen,SQ);
  // make board interactive for exploration
  setupExploreBoard(brd);
  bw.appendChild(bo);body.appendChild(bw);

  if(p.q){
    const q=document.createElement('div');
    q.className='puz-q';q.innerHTML=p.q;
    body.appendChild(q);
  }

  const opts=document.createElement('div');
  opts.className='opts';
  p.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    if(done)btn.classList.add(
      i===p.ans?'right':'off');
    btn.innerHTML=`<span class="dot"></span>
      <span>${o}</span>`;
    if(!done)btn.onclick=()=>{
      const btns=opts.querySelectorAll('.opt');
      btns.forEach((b,j)=>{
        b.classList.add(j===p.ans?'right':'off');
        if(j===i&&j!==p.ans)b.classList.add('wrong');
        b.style.pointerEvents='none';
      });
      const ab=card.querySelector('.ans');
      ab.classList.add('show',
        i===p.ans?'ok':'bad');
      ab.innerHTML=(i===p.ans?'\u2713 ':'\u2717 ')
        +p.expl;
      solved.add(p.id);save();
      card.querySelector('.badge').className=
        'badge done';
      card.querySelector('.badge').textContent=
        'Solved \u2713';
      updateProg();
    };
    opts.appendChild(btn);
  });
  body.appendChild(opts);

  const ans=document.createElement('div');
  ans.className='ans';
  if(done){ans.classList.add('show','ok');
    ans.innerHTML='\u2713 '+p.expl}
  body.appendChild(ans);

  if(!done){
    const rev=document.createElement('button');
    rev.className='rev';
    rev.textContent='Show Fischer\u2019s answer';
    rev.onclick=()=>{
      const btns=opts.querySelectorAll('.opt');
      btns.forEach((b,j)=>{
        b.classList.add(j===p.ans?'right':'off');
        b.style.pointerEvents='none';
      });
      ans.classList.add('show','ok');
      ans.innerHTML=p.expl;
      rev.style.display='none';
      solved.add(p.id);save();
      card.querySelector('.badge').className=
        'badge done';
      card.querySelector('.badge').textContent=
        'Solved \u2713';
      updateProg();
    };
    body.appendChild(rev);
  }

  card.appendChild(body);
  container.appendChild(card);
}

        clearHL(brd.svg);

          'Solved \u2713';
        updateProg();
        sel=-1;moves=[];
        // make board explorable after
        setupExploreBoard(brd);
        return;
      }
      // select piece
      if(brd.board[i]){
        const col=pc(brd.board[i]);

// ==========================================
// SIMPLE AI
// ==========================================
const VAL={k:900,q:9,r:5,b:3,n:3,p:1};
function pieceVal(p){
  if(!p)return 0;
  const t=p.toLowerCase();
  return VAL[t]||0;
}
function allMoves(board,color){
  const res=[];
  for(let i=0;i<64;i++){
    if(!board[i]||pc(board[i])!==color)continue;
    const mvs=getMoves(board,i);
    for(const to of mvs)res.push({from:i,to});
  }
  return res;
}
function aiMove(board,color){
  const mvs=allMoves(board,color);
  if(!mvs.length)return null;
  // score each move
  for(const m of mvs){
    m.score=0;
    const cap=board[m.to];
    if(cap)m.score+=pieceVal(cap)*10;
    // center control bonus
    const r=Math.floor(m.to/8),c=m.to%8;
    const ctr=3.5;
    m.score+=2-Math.abs(r-ctr)-Math.abs(c-ctr);
    // small randomness
    m.score+=Math.random()*2;
    // avoid moving king early
    const p=board[m.from].toLowerCase();
    if(p==='k')m.score-=3;
    // develop knights/bishops
    const fromR=Math.floor(m.from/8);
    if((p==='n'||p==='b')&&
      (fromR===0||fromR===7))m.score+=4;
  }
  mvs.sort((a,b)=>b.score-a.score);
  return mvs[0];
}

// FREE PLAY (vs AI)
// ==========================================
// global free play state
const FP={board:null,svg:null,sz:SQ,
  sel:-1,moves:[],turn:true,ai:true};

function fpRedraw(){
  // completely rebuild piece layer
  const g=FP.svg.querySelector('.pcs');
  const ns='http://www.w3.org/2000/svg';
  // remove all children
  while(g.lastChild)g.removeChild(g.lastChild);
  for(let i=0;i<64;i++){
    if(!FP.board[i])continue;
    const info=P[FP.board[i]];
    const t=document.createElementNS(ns,'text');
    const r=Math.floor(i/8),c=i%8;
    t.setAttribute('x',c*FP.sz+FP.sz/2);
    t.setAttribute('y',r*FP.sz+FP.sz/2+2);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','central');
    t.setAttribute('font-size',FP.sz*.76);
    t.style.userSelect='none';
    t.style.pointerEvents='none';
    if(info.c==='w'){
      t.setAttribute('fill','#fff');
      t.setAttribute('stroke','#2a2016');
      t.setAttribute('stroke-width','1.2');
      t.setAttribute('paint-order','stroke');
    }else{
      t.setAttribute('fill','#1a1208');
      t.setAttribute('stroke','#000');
      t.setAttribute('stroke-width','0.5');
    }
    t.textContent=info.s;
    g.appendChild(t);
  }
}

function fpClick(e){
  if(!FP.turn)return;
  const i=sqFromEv(FP.svg,e,FP.sz);
  if(i<0)return;
  const st=document.getElementById('freeStatus');
  // try to make a move
  if(FP.sel>=0&&FP.moves.includes(i)){
    const cap=FP.board[i];
    FP.board[i]=FP.board[FP.sel];
    FP.board[FP.sel]=null;
    FP.sel=-1;FP.moves=[];
    clearHL(FP.svg);
    fpRedraw();
    hlSq(FP.svg,i,'rgba(90,138,90,.3)',FP.sz);
    st.textContent=cap?'Captured!':'Moved!';
    // AI response
    if(FP.ai){
      FP.turn=false;
      st.textContent='Black is thinking...';
      setTimeout(fpDoAI,500);
    }
    return;
  }
  // select a piece
  const canMove=FP.ai
    ?FP.board[i]&&pc(FP.board[i])==='w'
    :!!FP.board[i];
  if(canMove){
    FP.sel=i;
    FP.moves=getMoves(FP.board,i);
    clearHL(FP.svg);
    hlSq(FP.svg,i,'rgba(255,255,100,.35)',FP.sz);
    showDots(FP.svg,FP.board,FP.moves,FP.sz);
    st.textContent=FP.moves.length+' moves';
  }else{
    FP.sel=-1;FP.moves=[];
    clearHL(FP.svg);
  }
}

function fpDoAI(){
  const m=aiMove(FP.board,'b');
  const st=document.getElementById('freeStatus');
  if(!m){st.textContent='Black has no moves!';
    FP.turn=true;return}
  const cap=FP.board[m.to];
  FP.board[m.to]=FP.board[m.from];
  FP.board[m.from]=null;
  clearHL(FP.svg);
  fpRedraw();
  hlSq(FP.svg,m.from,'rgba(196,80,80,.2)',FP.sz);
  hlSq(FP.svg,m.to,'rgba(196,80,80,.3)',FP.sz);
  st.textContent=cap
    ?'Black captured! Your turn.'
    :'Black moved. Your turn.';
  FP.turn=true;
}

function fpLoad(fen){
  const bo=document.getElementById('freeBoard');
  bo.innerHTML='';
  FP.board=fen2b(fen);
  FP.sel=-1;FP.moves=[];FP.turn=true;
  FP.ai=fen.includes('rnbqkbnr');
  // create SVG
  const ns='http://www.w3.org/2000/svg';
  const bsz=FP.sz*8;
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',bsz);
  svg.setAttribute('height',bsz);
  svg.setAttribute('viewBox',`0 0 ${bsz} ${bsz}`);
  svg.style.cursor='pointer';
  for(let r=0;r<8;r++)
    for(let c=0;c<8;c++){
      const rect=document.createElementNS(ns,'rect');
      rect.setAttribute('x',c*FP.sz);
      rect.setAttribute('y',r*FP.sz);
      rect.setAttribute('width',FP.sz);
      rect.setAttribute('height',FP.sz);
      rect.setAttribute('fill',
        (r+c)%2===0?'#d4b896':'#8a6e4a');
      svg.appendChild(rect);
    }
  const hl=document.createElementNS(ns,'g');
  hl.classList.add('hl');svg.appendChild(hl);
  const pcs=document.createElementNS(ns,'g');
  pcs.classList.add('pcs');svg.appendChild(pcs);
  const dots=document.createElementNS(ns,'g');
  dots.classList.add('dots');svg.appendChild(dots);
  bo.appendChild(svg);
  FP.svg=svg;
  fpRedraw();
  svg.addEventListener('click',fpClick);
  const st=document.getElementById('freeStatus');
  st.textContent=FP.ai
    ?'You are White — make your move!'
    :'Click any piece to explore';
}

function restoreScroll(){
  const y=localStorage.getItem(SCROLL_KEY);
  if(y)setTimeout(()=>window.scrollTo(0,+y),100);
}
let scrollTimer=null;
window.addEventListener('scroll',()=>{
  clearTimeout(scrollTimer);
  scrollTimer=setTimeout(saveScroll,300);
});

// ==========================================
// INIT
// ==========================================
build();
updateProg();
restoreScroll();
</script>
</body>
